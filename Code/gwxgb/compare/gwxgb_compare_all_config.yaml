base_config: "../gwxgb_config.yaml"

output:
  output_dir: "../../../Output/output_gwxgb_compare"
  run_prefix: "gwxgb_compare_all"
  # compare 脚本默认关闭 stdout/stderr 捕获，避免 geoxgboost 在解释器退出阶段触发日志流收尾问题
  capture_prints: 0

compare:
  # 设为 0 时直接使用继承自 gwxgb_config.yaml 的全量数据
  row_limit: 0
  top_k: 5
  plot_top_n: 10
  run_center_local: 1
  run_local_importance: 1
  run_pooled_local: 1
  run_sample_aggregated_local: 1
