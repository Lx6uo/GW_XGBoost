data:
  # CSV 数据路径（可以是相对或绝对路径）
  path: "../../Data/年份终市级指标数据（5年截面）/终市级指标数据_with_latlon_2005.csv"
  # 因变量列名
  target: "co2总量（万吨）"
  # 自变量列表，不写则默认使用除 target 以外的所有列
  features:  [ 
    "施工面积(万平方米)",
    "建筑面积(万平方米)",
    "电力消费量（亿千瓦小时）",
    "电网因子（kgco2/kwh)",
    "人均地区生产总值(元）",
    "第三产业比重",
    "总人口（万人）",
    "城镇化率",
    "能源结构",
    # "气候区",  --- IGNORE ---  # 气候区是分类变量，暂不纳入特征列表（后续可考虑编码后加入）
    "单位面积建材碳排放（kgco2/m2)"
    ]
  sep: ","
  encoding: "utf-8"

model:
  # 参数
  random_state: 3407
  # 训练/测试划分中的测试集比例
  test_size: 0.2
  params:
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 3
    min_child_weight: 8
    subsample: 0.8
    colsample_bytree: 1
    reg_alpha: 0.1
    reg_lambda: 1
    # 其他 XGBoost 参数后续

cv:
  # 是否启用 K 折交叉验证（0/1）
  use_cv: 1
  # 折数，例如 5 折
  n_splits: 5
  # 随机种子（用于打乱样本）
  random_state: 233

shap:
  # SHAP 计算引擎: auto / shap / xgboost
  # - auto: 默认；当 shap 版本较旧且 xgboost>=3 时自动改用 xgboost 原生 SHAP（避免 TreeExplainer 报错）
  # - shap: 强制使用 shap.TreeExplainer
  # - xgboost: 强制使用 xgboost Booster.predict(pred_contribs/pred_interactions)
  engine: "auto"
  # 是否生成 SHAP summary 图（0/1）
  use_summary: 0
  # 是否生成 SHAP dependence 图（0/1）
  use_dependence: 1
  # 是否对所有特征都输出单独的 dependence 图（0/1）
  # - 若为 1，则忽略 dependence_top_n（但仍会尊重 dependence_features）
  dependence_all: 1
  # 交互作用图基准特征，例如 "x2"
  interaction_base: "x2"
  # 与基准特征绘制交互作用图的特征列表，例如 ["x3", "x5"]
  interaction_with: ["x3", "x5"]
  # 指定需要画 dependence 图的特征列表；如果省略，则自动选择重要性最高的前 N 个
  # dependence_features: ["x1", "x2"]
  # 自动选择 dependence 特征时使用的 top N
  dependence_top_n: 5
  # 是否计算并导出特征间交互作用（0/1，开启会多算一步 SHAP interaction values）
  compute_interactions: 1
  # 导出的交互作用特征对数量（按平均绝对交互强度从大到小排序）
  interaction_top_n_pairs: 20

output:
  # 输出目录
  output_dir: "../../Output/output_xgb"
  # 是否按运行时间自动创建子目录（0/1；默认 1）
  timestamp_subdir: 1
  # 子目录时间格式（仅用于命名）
  timestamp_format: "%Y%m%d_%H%M%S"
  # 子目录名前缀（可选；不填则脚本默认用 xgb_）
  run_prefix: "xgb_"
  # 是否在子目录名中附加输入数据文件名（0/1；默认 1）
  include_data_name: 1
  # 输入数据文件名的最大长度（避免路径过长）；0 表示不截断
  data_name_max_len: 40
  # 日志文件名（保存到本次运行 output 子目录下）
  log_file: "run_log.txt"
  # 是否将 stdout/stderr（含 print 输出）一并写入日志文件（0/1）
  capture_prints: 1
  # 已有模型文件名（可选）
  # model_file: "xgb_model.json"
  # SHAP summary 图文件名
  summary_file: "shap_summary.png"
  # Mean(|SHAP|) 条形图文件名（可选；不写则代码默认 mean_abs_shap.png）
  mean_abs_shap_file: "mean_abs_shap.png"
  # SHAP dependence 图文件名前缀
  dependence_prefix: "shap_dependence_"
  # 交互作用 SHAP 图文件名前缀（基准特征 × 其它特征）
  interaction_prefix: "shap_interaction_"
  # 交互作用结果文件名（CSV）
  interaction_pairs_file: "shap_interactions.csv"

tuning:
  # 是否启用嵌套交叉验证自动调参（仅在 xgb_nestedcv_tune.py 中使用）
  use_nested_cv: 1
  # 内层 GridSearch 的评分指标（默认 r2；也可设为 neg_root_mean_squared_error 等）
  scoring: "r2"
  # GridSearchCV 的 verbose（0=静默；1=打印总 fits；2=打印每个 fit；越大越啰嗦）
  grid_verbose: 1
  # （可选）early stopping（仅影响调参阶段）
  # - 实现方式：在每个 CV fold 的训练集内再切一份 eval_set 用于 early stopping
  # - 注意：n_estimators 变成“上限”，通常建议设大一些/或从搜索网格中移除 n_estimators
  early_stopping:
    enabled: 0
    rounds: 50
    eval_fraction: 0.2
    eval_metric: "rmse"
    min_train_samples: 20
  # 推荐写法：直接提供 param_grid（可同时搜索多个参数）。
  # 你可以注释掉某一行（例如 "# - 500"）来跳过某个取值，也可以注释掉整个参数块来不搜索该参数。
  param_grid:
    # n_estimators: # 树的数量
    #   - 200
    #   - 300
    #   - 400
    #   - 600
    # max_depth: # 树的最大深度
    #   - 2
    #   - 3
    #   - 4
    #   - 5
    # learning_rate: # 学习率
    #   - 0.05
    #   - 0.1
    # min_child_weight: # 叶子节点最小样本权重和 (防过拟合)
    #   - 6
    #   - 8
    #   - 10
    #   - 12
    # subsample: # 样本采样率
    #   - 0.4
    #   - 0.6
    #   - 0.8
    # colsample_bytree: # 特征采样率
    #   - 0.6
    #   - 0.8
    #   - 1.0
    reg_alpha: 
      - 0.001
      - 0.01
      - 0.02
      - 0.05
      - 0.1

    reg_lambda: 
      - 1
      - 2
      - 5
      - 10

  # 旧格式（最多同时调 3 个超参数）：如果不使用 param_grid，可用 param1/param2/param3。
  # 最多同时调 3 个超参数；名称需与 model.params 中的 key 一致
  # param1: "colsample_bytree"
  # param1_values: [0.5, 0.6, 0.7, 0.8]
  # param2: "subsample"
  # param2_values: [0.5, 0.6, 0.7, 0.8]
  # param3: "min_child_weight"
  # param3_values: [1, 2, 3, 4, 5]
  # param1: "n_estimators"
  # param1_values: [100, 200, 400, 600]
  # param2: "learning_rate"
  # param2_values: [0.1, 0.05, 0.03, 0.02,]
  # param3: "max_depth"
  # param3_values: [1, 2, 3, 4, 5, 6]
  # 外层 / 内层交叉验证折数（可选，缺省为 5 / 3）
  outer_splits: 5
  inner_splits: 3
  # 是否在全量数据上再跑一次最终 GridSearchCV（0/1；开启会额外耗时）
  # - 适合用于拿到“最终要落盘训练”的一组 best_params
  # - 外层评估仍以嵌套 CV 结果为准
  final_grid_search: 0
  # 全量 GridSearchCV 的 CV 折数（可选；缺省使用 inner_splits）
  # final_cv: 3

attribution:
  # 归因稳健性分析输出子目录（位于本次运行 output 子目录下）
  output_subdir: "attribution_robustness"
  # 是否输出归因稳健性图（0/1）
  save_plots: 1
  # 图像输出子目录（位于 attribution.output_subdir 下）
  plots_dir: "plots"
  # 每张柱状图展示的特征数量
  plot_top_n: 10
  # 跨方案热力图最多展示多少个特征
  comparison_max_features: 15
  # 每张 SHAP summary 图最多展示多少个特征
  summary_max_display: 15
  # 归因稳健性图 DPI
  plot_dpi: 300
  # 本质上是类别变量、但目前以数值编码存储的特征；正式分析会优先编码后再纳入
  categorical_features:
    - "气候区"
  # 连续特征列表；如省略则自动使用除 categorical_features 外的其它特征
  # continuous_features:
  #   - "施工面积(万平方米)"
  #   - "建筑面积(万平方米)"
  # 候选归因口径（按顺序执行）
  candidate_specs:
    - "raw_x__raw_y"
    - "encoded_cat__raw_y"
    - "encoded_cat__log_skewed_x__raw_y"
    - "encoded_cat__log_y"
    - "encoded_cat__log_skewed_x__log_y"
    - "encoded_cat__zscore_x__raw_y"
    - "encoded_cat__minmax_x__raw_y"
  # log_skewed_x 的判定规则：连续特征满足 min>0 且 p95/p50 >= 阈值
  log_skewed_ratio_threshold: 8.0
  # 归因稳健性评估：5 次重复 × 5 折验证集 SHAP
  cv_repeats: 5
  cv_splits: 5
  cv_seeds: [3407, 233, 42, 7, 2026]
  # Top-K 稳定性统计口径
  top_k: 5
  # 正式口径的性能约束基线（推荐使用编码类别后的原始口径）
  baseline_spec: "encoded_cat__raw_y"
  # 正式口径约束：相对 baseline，R2 最多下降 0.05，RMSE 最多上升 10%
  performance_r2_drop_tolerance: 0.05
  performance_rmse_rise_tolerance: 0.10
  # 平均 Spearman 接近时的并列阈值；并列时再看 Top-K 稳定性和是否使用 log_y
  spearman_tie_tolerance: 0.02

preprocess_normalize:
  # 归一化预处理输出子目录（位于本次运行 output 子目录下）
  output_subdir: "preprocess_normalize"
  # 归一化后的整表文件名
  output_file: "normalized_feature_table.csv"
  # 归一化清单文件名
  manifest_file: "normalized_feature_manifest.csv"
  # 指定要参与归一化的特征；如省略则默认使用 data.features
  # include_features:
  #   - "施工面积(万平方米)"
  #   - "建筑面积(万平方米)"
  # 已经属于比例/比率/人均/单位面积等“相对量”的特征，默认排除
  exclude_features:
    - "电网因子（kgco2/kwh)"
    - "第三产业比重"
    - "城镇化率"
    - "能源结构"
